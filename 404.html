<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  // GitHub Pages PWA fix: redirect any 404 back to index.html
  // preserving the path so the app can handle routing
  const path = window.location.pathname;
  const repo = path.split('/')[1]; // e.g. "noorquran"
  window.location.replace('/' + repo + '/index.html');
</script>
</head>
<body></body>
</html>
